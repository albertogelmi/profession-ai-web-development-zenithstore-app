version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: mysql-zenithstore
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: zenithstore
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./documentations/ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql
      - ./documentations/dml.sql:/docker-entrypoint-initdb.d/02-dml.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - zenithstore-network

  mongodb:
    image: mongo:latest
    container_name: mongodb-zenithstore
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: zenithstore
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./documentations/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - zenithstore-network

networks:
  zenithstore-network:
    # Explicit name so Docker Compose project name doesn't affect it.
    # All infra compose files reference this as: external: true / name: zenithstore-network
    name: zenithstore-network
    driver: bridge

volumes:
  mysql_data:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
